<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Home Page</title>
  </head>
  <body class="bg-[#f4f5f7] min-h-screen">
    <!-- header section -->
    <section
      class="flex items-center justify-between max-w-lg mx-auto border-b-1 border-gray-300 p-3"
    >
      <div class="flex items-center">
        <img src="../../assets/logo.png" alt="logo" class="w-24" />
        <div class="text-black">
          <h2 class="font-bold">$5000</h2>
          <p class="font-normal">Available Balance</p>
        </div>
      </div>

      <button class="btn">
        <i class="fa-solid fa-right-from-bracket mt-1 rotate-180"></i>
        Logout
      </button>
    </section>

    <!-- Payment Services -->
    <div class="max-w-lg mx-auto mt-8">
      <h2 class="font-bold">🔥Welcome to MY<span>PAY</span></h2>
      <p class="text-gray-500">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>
    </div>

    <div class="max-w-lg mx-auto m-h-[200px] grid grid-cols-3 gap-4 mt-8">
      <div class="border-2 border-gray-300 rounded-2xl text-center p-3">
        <img src="../../assets/opt-1.png" alt="Add Money" class="mx-auto" />
        <p>Add Money</p>
      </div>
      <div class="border-2 border-gray-300 rounded-2xl text-center p-3">
        <img src="../../assets/opt-2.png" alt="Cashout" class="mx-auto" />
        <p>Cashout</p>
      </div>
      <div class="border-2 border-gray-300 rounded-2xl text-center p-3">
        <img
          src="../../assets/opt-3.png"
          alt="Transfer Money"
          class="mx-auto"
        />
        <p>Transfer Money</p>
      </div>
      <div class="border-2 border-gray-300 rounded-2xl text-center p-3">
        <img src="../../assets/opt-4.png" alt="Get Bonus" class="mx-auto" />
        <p>Get Bonus</p>
      </div>
      <div class="border-2 border-gray-300 rounded-2xl text-center p-3">
        <img src="../../assets/opt-5.png" alt="Pay Bill" class="mx-auto" />
        <p>Pay Bill</p>
      </div>
      <div class="border-2 border-gray-300 rounded-2xl text-center p-3">
        <img src="../../assets/opt-6.png" alt="Transactions" class="mx-auto" />
        <p>Transactions</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
