<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/money.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-pay</title>
  </head>
  <body class="bg-[#f4f5f7] min-h-screen flex justify-center items-center">
    <!-- Login page -->
    <section>
      <div class="flex justify-center mb-4">
        <img src="assets/logo.png" alt="My Pay Logo" class="w-56" />
      </div>
      <form
        id="login-form"
        class="bg-white rounded-2xl p-8 w-80"
        autocomplete="off"
      >
        <div>
          <label for="mobile" class="font-bold">Mobile Number</label>
          <br />
          <input
            id="mobile"
            name="mobile"
            type="tel"
            inputmode="numeric"
            required
            placeholder="Enter Your Number"
            class="input bg-[#f4f5f7] mt-3 w-full rounded-3xl"
          />
        </div>
        <div class="mt-5">
          <label for="pin" class="font-bold">4 Digit Pin</label>
          <br />
          <input
            id="pin"
            name="pin"
            type="password"
            inputmode="numeric"
            maxlength="4"
            required
            placeholder="Enter 4 Digit Pin"
            class="input bg-[#f4f5f7] mt-3 w-full rounded-3xl"
          />
        </div>
        <button id="loginButton" type="submit" class="btn btn-primary rounded-3xl mt-12 w-full">
          Login
        </button>
      </form>
    </section>


    <script type="module" src="/src/main.js"></script>
  </body>
</html>
